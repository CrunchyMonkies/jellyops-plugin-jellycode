name: worker-images

# Build the distributed-transcoding worker in its three hardware variants and publish them to the
# GitHub Container Registry as a single package with per-variant tags.
on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'docker/Dockerfile.worker'
      - 'docker/worker-entrypoint.sh'
      - 'Directory.Build.props'
      - '.github/workflows/worker-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/worker

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, intel, nvidia]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # One package, per-variant tags. `latest` tracks the cpu variant.
          tags: |
            type=raw,value=${{ matrix.variant }}
            type=sha,prefix=${{ matrix.variant }}-
            type=ref,event=tag,prefix=${{ matrix.variant }}-
            type=raw,value=latest,enable=${{ matrix.variant == 'cpu' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          target: ${{ matrix.variant }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=worker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=worker-${{ matrix.variant }}
